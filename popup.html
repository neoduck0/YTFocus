<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YTFocus</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="header-text">
        <h1>YTFocus</h1>
        <p>Declutter YouTube in one tap.</p>
      </div>
      <label class="switch" aria-label="Master toggle">
        <input type="checkbox" id="masterToggle">
        <span class="slider"></span>
      </label>
    </header>

    <section class="settings">
      <article class="setting-row">
        <div class="setting-label">
          <span class="setting-name">Hide Shorts</span>
          <span class="setting-note">Removes Shorts shelves and links</span>
        </div>
        <label class="switch" aria-label="Hide Shorts">
          <input type="checkbox" id="hideShorts">
          <span class="slider"></span>
        </label>
      </article>

      <article class="setting-row">
        <div class="setting-label">
          <span class="setting-name">Hide Comments</span>
          <span class="setting-note">Keeps watch pages distraction free</span>
        </div>
        <label class="switch" aria-label="Hide Comments">
          <input type="checkbox" id="hideComments">
          <span class="slider"></span>
        </label>
      </article>

      <article class="setting-row">
        <div class="setting-label">
          <span class="setting-name">Hide Recommendations</span>
          <span class="setting-note">Hides sidebar and home suggestions</span>
        </div>
        <label class="switch" aria-label="Hide Recommendations">
          <input type="checkbox" id="hideRecommendations">
          <span class="slider"></span>
        </label>
      </article>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
